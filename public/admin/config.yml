# הגדרות פאנל הניהול (Decap CMS)
# הפאנל זמין בכתובת: https://shiran-shoshani-law.netlify.app/admin/
# אימות: GitHub OAuth דרך שירות ה-OAuth של Netlify.

backend:
  name: github
  repo: shoshanilawoffice-pixel/pro-law-connect
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth
  commit_messages:
    create: "תוכן: נוצר {{slug}}"
    update: "תוכן: עודכן {{slug}}"
    delete: "תוכן: נמחק {{slug}}"
    uploadMedia: "תוכן: הועלה קובץ {{path}}"
    deleteMedia: "תוכן: נמחק קובץ {{path}}"

locale: he

# עריכה מקומית (npx decap-server) — פעיל רק כשהפאנל נפתח מ-localhost; לא משפיע על האתר החי
local_backend: true

# תמונות שמועלות בפאנל נשמרות ב-public/images ומוגשות מ-/images
media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "site"
    label: "תוכן האתר"
    files:
      - name: "homepage"
        label: "דף הבית"
        file: "src/content/homepage.json"
        fields:
          # ---- קבוצה 1: עיצוב ולוגו ----
          - label: "🎨 עיצוב ולוגו"
            name: "branding"
            widget: "object"
            collapsed: true
            fields:
              - label: "לוגו המשרד"
                name: "logo"
                widget: "image"
                hint: "מופיע בתפריט העליון ובתחתית האתר. מומלץ תמונה מרובעת."
              - label: "טקסט נוסף בשורת זכויות היוצרים"
                name: "footerText"
                widget: "string"
                required: false
                hint: "אופציונלי — יופיע ליד © והשנה (השנה מתעדכנת אוטומטית)."

          # ---- קבוצה 2: אזור ראשי (Hero) ----
          - label: "🏠 אזור ראשי (Hero)"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - label: "כותרת ראשית"
                name: "title"
                widget: "string"
              - label: "תיאור קצר"
                name: "description"
                widget: "markdown"
                buttons: ["bold", "italic", "link"]
                editor_components: []
                hint: "אפשר להדגיש מילים ולהוסיף קישורים."
              - label: "תמונת רקע ראשית"
                name: "image"
                widget: "image"
                hint: "תמונת התדמית הגדולה בראש הדף."
              - label: "טקסט כפתור הנעה לפעולה"
                name: "ctaText"
                widget: "string"
                required: false
                hint: "השאירו ריק כדי להסתיר את הכפתור."
              - label: "קישור הכפתור"
                name: "ctaLink"
                widget: "string"
                required: false
                default: "#contact"
                hint: "לדוגמה: #contact לטופס, או כתובת מלאה."

          # ---- קבוצה 3: אודות המשרד ----
          - label: "👩‍⚖️ אודות המשרד"
            name: "about"
            widget: "markdown"
            buttons: ["bold", "italic", "bulleted-list", "numbered-list", "link"]
            editor_components: []
            hint: "עורך עשיר: הדגשה, רשימות וקישורים. פסקאות מופרדות בשורה ריקה."

          # ---- תחומי עיסוק ----
          - label: "⚖️ תחומי עיסוק"
            name: "practiceAreas"
            widget: "list"
            label_singular: "תחום עיסוק"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            hint: "גררו כרטיסיות לשינוי הסדר. לחצו על + להוספה."
            fields:
              - label: "שם התחום"
                name: "title"
                widget: "string"
              - label: "תיאור"
                name: "desc"
                widget: "markdown"
                buttons: ["bold", "italic", "link"]
                editor_components: []
              - label: "תמונה/אייקון מותאם"
                name: "image"
                widget: "image"
                required: false
                hint: "אופציונלי — אם לא תועלה תמונה, יוצג אייקון אוטומטי לפי שם התחום."

          # ---- שירותי המשרד ----
          - label: "⭐ שירותי המשרד"
            name: "services"
            widget: "list"
            label_singular: "שירות"
            collapsed: true
            field: { label: "שירות", name: "service", widget: "string" }
            hint: "רשימת הנקודות בסקשן \"שירותי המשרד\". גררו לשינוי סדר."

          # ---- ציטוטים ----
          - label: "💬 ציטוטים (רצועות בגופן תנ\"כי)"
            name: "quotes"
            widget: "list"
            label_singular: "ציטוט"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.text}}"
            hint: "עד 4 ציטוטים המפוזרים לאורך דף הבית."
            fields:
              - { label: "טקסט הציטוט", name: "text", widget: "string" }
              - { label: "מחבר/ת", name: "author", widget: "string" }

          # ---- המלצות לקוחות ----
          - label: "🌟 המלצות לקוחות"
            name: "testimonials"
            widget: "list"
            label_singular: "המלצה"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.name}}"
            fields:
              - { label: "שם (למשל: ל.כ, אילת)", name: "name", widget: "string" }
              - { label: "טקסט ההמלצה", name: "text", widget: "text" }

          # ---- מאמרים ----
          - label: "📰 מאמרים"
            name: "articles"
            widget: "list"
            label_singular: "מאמר"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "כותרת", name: "title", widget: "string" }
              - { label: "תקציר", name: "excerpt", widget: "text" }
              - { label: "תאריך", name: "date", widget: "string", hint: "למשל: 26/08/2025" }

          # ---- קבוצה 4: פרטי התקשרות ומפת הגעה ----
          - label: "📞 פרטי התקשרות ומפת הגעה"
            name: "contact"
            widget: "object"
            collapsed: true
            fields:
              - { label: "טלפון", name: "phone", widget: "string" }
              - { label: "נייד", name: "mobile", widget: "string" }
              - { label: "פקס", name: "fax", widget: "string" }
              - { label: "אימייל", name: "email", widget: "string" }
              - { label: "כתובת פיזית (אילת)", name: "address", widget: "string" }
              - label: "קישור למפת הגעה (Google Maps)"
                name: "mapUrl"
                widget: "string"
                required: false
                hint: "הכתובת בתחתית האתר תהפוך לקישור למפה."

      # ================= עמוד מתגשרים והעמותה =================
      - name: "mitgashrim"
        label: "עמוד מתגשרים והעמותה"
        file: "src/content/mitgashrim.json"
        fields:
          - { label: "כותרת ראשית", name: "heroTitle", widget: "string" }
          - { label: "כותרת משנה", name: "heroSubtitle", widget: "string" }
          - { label: "פסקת פתיחה", name: "heroIntro", widget: "text" }
          - { label: "לוגו התוכנית", name: "logo", widget: "image" }
          - { label: "כותרת סקשן העקרונות", name: "principlesTitle", widget: "string" }
          - label: "עקרונות התוכנית"
            name: "principles"
            widget: "list"
            label_singular: "עיקרון"
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}}"
            fields:
              - { label: "כותרת", name: "title", widget: "string" }
              - { label: "תיאור", name: "desc", widget: "text" }
          - { label: "כותרת \"למה גישור\"", name: "whyTitle", widget: "string" }
          - label: "תוכן \"למה גישור\""
            name: "whyBody"
            widget: "markdown"
            buttons: ["bold", "italic", "bulleted-list", "link"]
            editor_components: []
          - { label: "ציטוט (בגופן תנ\"כי)", name: "quote", widget: "string", required: false }
          - { label: "כותרת סקשן העמותה", name: "amutaTitle", widget: "string" }
          - label: "תוכן סקשן העמותה"
            name: "amutaBody"
            widget: "markdown"
            buttons: ["bold", "italic", "bulleted-list", "link"]
            editor_components: []
          - { label: "כותרת טופס יצירת הקשר", name: "contactTitle", widget: "string" }
          - { label: "טקסט מתחת לכותרת הטופס", name: "contactSubtitle", widget: "string" }

      # ================= הצהרת נגישות =================
      - name: "accessibility"
        label: "הצהרת נגישות"
        file: "src/content/accessibility.json"
        fields:
          - { label: "כותרת", name: "title", widget: "string" }
          - { label: "שורת תאריך עדכון", name: "updated", widget: "string" }
          - label: "תוכן ההצהרה"
            name: "body"
            widget: "markdown"
            buttons: ["bold", "italic", "bulleted-list", "numbered-list", "link", "heading-two", "heading-three"]
            editor_components: []
            hint: "כותרות סעיפים עם \"כותרת 2\", רשימות וקישורים."

      # ================= מדיניות פרטיות =================
      - name: "privacy"
        label: "מדיניות פרטיות"
        file: "src/content/privacy.json"
        fields:
          - { label: "כותרת", name: "title", widget: "string" }
          - { label: "שורת תאריך עדכון", name: "updated", widget: "string" }
          - label: "תוכן המדיניות"
            name: "body"
            widget: "markdown"
            buttons: ["bold", "italic", "bulleted-list", "numbered-list", "link", "heading-two", "heading-three"]
            editor_components: []
            hint: "כותרות סעיפים עם \"כותרת 2\", רשימות וקישורים."
